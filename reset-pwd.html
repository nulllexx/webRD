<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BakoSMP - Reset Password</title>
  <link rel="stylesheet" href="/main.css"/>
  <link rel="stylesheet" href="/cookie.css">
  <style>
    html {
      scroll-behavior: smooth;
    }
    
    .section {
      padding-top: 2em;
      margin-top: -2em; /* Offset for fixed header if needed */
    }
    
    .section:target {
      animation: highlight 2s ease-in-out;
    }
    
    @keyframes highlight {
      0% { background-color: rgba(255, 255, 255, 0.1); }
      50% { background-color: rgba(255, 255, 255, 0.2); }
      100% { background-color: transparent; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles-js"></div>
  <div class="topbar">
    <img src="/main.png" alt="BakoSMP Logo" class="logo" />
    <span class="title">BakoSMP</span>
    <a class="title" href="index" style="margin-left: 2em;">Home</a>
    <a class="title" href="uploads" style="margin-left: 2em;">Uploads</a>
    <a class="title" href="storage/" style="margin-left: 2em;">Data storage</a>
    <a class="title" href="raindrippy/" style="margin-left: 2em;">RainDrippy</a>
  </div>
  <div id="cookie-banner">
    <p id="txt">This website uses cookies to ensure you get the best experience.</p>
    <a href="/raindrippy/privacy-policy" target="_blank">Learn more</a>
    <button id="cookie-ok">OK</button>
  </div>
  <script src="/js/cookies.js"></script>
  <div class="content">
    <section id="reset-password" class="section"></section>
    <script>
      const session = new URLSearchParams(window.location.search).get('session');
      if (!session) {
        document.write('<h3 style="text-align: center;">You need to have a session ID in the URL to use this webpage.</h3>');
      } else {
        document.write(`
          <h1 style="text-align: center;">Reset Password</h1>
          <form id="resetForm" style="max-width: 400px; margin: auto;">
            <input type="hidden" id="session" name="session" value="${session}" />
            <label for="newPassword">New Password:</label><br/>
            <input type="password" id="newPassword" name="newPassword" required style="width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box;"/><br/>
            <label for="confirmPassword">Confirm Password:</label><br/>
            <input type="password" id="confirmPassword" name="confirmPassword" required style="width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box;"/><br/>
            <button type="submit" style="width: 100%; padding: 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer;">Reset Password</button>
          </form>
          <p id="message" style="text-align: center; color: red;"></p>
        `);
      }
    </script>
    <script>
      document.getElementById('resetForm')?.addEventListener('submit', async function(event) {
        event.preventDefault();
        const session = document.getElementById('session').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const messageElem = document.getElementById('message');

        if (newPassword !== confirmPassword) {
          messageElem.textContent = 'Passwords do not match.';
          return;
        }

        try {
          const response = await fetch('/api/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ resetSession: session, newPassword })
          });
          const result = await response.json();
          if (response.status === 200) {
            messageElem.style.color = 'green';
            messageElem.textContent = 'Password reset successfully. You can now log in with your new password.';
          } else {
            messageElem.textContent = result.error || 'An error occurred.';
          }
        } catch (error) {
          messageElem.textContent = 'An error occurred. Please try again later.';
        }
      });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    <script src="particles.js"></script>
    <script src="/js/genFP.js"></script>
  </div>
</body>
</html>
