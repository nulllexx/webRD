<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Project Editor</title>
  <link rel="stylesheet" href="/raindrippy/projects/index.css">
  <link rel="stylesheet" href="/cookie.css">
  
  <!-- Prism.js CSS for syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; margin:20px; color:#222; }
    #header { display:flex; gap:16px; align-items:center; margin-bottom:12px; }
    #files { display:flex; gap:12px; flex-wrap:wrap; }
    .file-card { border:1px solid #e6e6e6; padding:10px; border-radius:8px; width:260px; box-shadow:0 1px 4px rgba(0,0,0,0.03); }
    .file-name { font-weight:600; margin-bottom:6px; word-break:break-word; }
    .file-meta { font-size:12px; color:#666; }
    .actions { margin-top:8px; display:flex; gap:8px; flex-wrap:wrap; }
    .btn { padding:6px 10px; border-radius:6px; border:1px solid #ddd; background:#f6f6f6; cursor:pointer; color: rgb(65,65,65) }
    .btn.primary { background:#0077ff; color:#fff; border-color:#0077ff; }
    #editor-pane { margin-top:18px; display:flex; gap:12px; }
    #editor { flex:1; display:flex; flex-direction:column; }
    
    /* Editor container with syntax highlighting */
    #editor-container {
      position: relative;
      width: 100%;
      min-height: 360px;
      border: 1px solid #ddd;
      border-radius: 6px;
      overflow: hidden;
      background: #2d2d2d;
    }
    
    #file-text {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 12px;
      margin: 0;
      border: none;
      background: transparent;
      color: transparent;
      caret-color: #fff;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
      resize: vertical;
      z-index: 2;
      outline: none;
      box-sizing: border-box;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    
    #syntax-highlight {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 12px;
      margin: 0;
      overflow: auto;
      pointer-events: none;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
      z-index: 1;
      background: #2d2d2d;
      box-sizing: border-box;
    }
    
    #syntax-highlight code {
      background: transparent !important;
      padding: 0 !important;
      margin: 0 !important;
      font-family: inherit !important;
      font-size: inherit !important;
      line-height: inherit !important;
    }
    
    #upload-form { display:flex; gap:8px; align-items:center; }
    .small { font-size:12px; color:#666; }
    div {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .language-badge {
      display: inline-block;
      padding: 2px 8px;
      background: #0077ff;
      color: white;
      border-radius: 4px;
      font-size: 11px;
      margin-left: 8px;
    }
  </style>
  <link rel="icon" type="image/png" href="/raindrippy/rd.png">
</head>
<body>
  <div id="header">
    <button onclick="location.href='/raindrippy/projects/index.html'" class="btn">← Back</button>
    <h2 id="project-name">Project</h2>
    <div style="margin-left:auto" class="small">Project ID: <code id="project-id">-</code></div>
  </div>
  <div id="cookie-banner">
    This website uses cookies to ensure you get the best experience.
    <a href="/raindrippy/privacy-policy" target="_blank">Learn more</a>
    <button id="cookie-ok">OK</button>
  </div>
  <div id="controls" style="display:flex; gap:12px; align-items:center; margin-bottom:12px; flex-direction: row;">
    <form id="upload-form">
      <input id="file-input" type="file" name="file" style="color: white;" />
      <button id="upload-btn" class="btn primary" type="button">Upload</button>
    </form>
    <form id="create-form">
      <input id="create-filename" type="text" name="filename" placeholder="New file name (e.g., notes.txt)" style="color: black;" />
      <button id="create-btn" class="btn primary" type="button">Create New File</button>
    </form>
    <div class="small" id="quota-info">Loading quota...</div>
  </div>

  <div id="editor-pane">
    <div style="width:340px">
      <h3>Files</h3>
      <div id="files">Loading files...</div>
    </div>

    <div id="editor" aria-live="polite">
      <h3>Editor</h3>
      <div id="file-info" class="small">No file selected</div>
      
      <div id="editor-container">
        <pre id="syntax-highlight"><code id="highlight-code" class="language-javascript"></code></pre>
        <textarea id="file-text" placeholder="Select a text file to edit..." disabled spellcheck="false"></textarea>
      </div>
      
      <div style="margin-top:8px; display:flex; gap:8px;">
        <button id="save-btn" class="btn primary" disabled>Save (replace)</button>
        <button id="download-btn" class="btn" disabled>Download</button>
        <button id="copy-link-btn" class="btn" disabled>Copy Link</button>
        <button id="close-btn" class="btn" disabled>Close</button>
      </div>
      <div id="editor-msg" class="small" style="margin-top:8px;color:#b00020;"></div>
    </div>
  </div>

  <!-- Prism.js Core -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <!-- Prism.js Language Components (order matters for dependencies) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-clike.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-csharp.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup-templating.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-php.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-ruby.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-go.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-rust.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-swift.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-kotlin.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>

  <script>
    const apiFetch = async (path, opts = {}) => {
      opts.credentials = 'include';
      const res = await fetch(path, opts);
      if (!res.ok) {
        const txt = await res.text().catch(()=>null);
        const err = new Error(txt || res.statusText || `HTTP ${res.status}`);
        err.status = res.status;
        throw err;
      }
      const ct = res.headers.get('content-type') || '';
      return ct.includes('application/json') ? res.json() : res;
    };

    const qs = (k) => new URLSearchParams(location.search).get(k);

    const projectId = qs('projectId') || '';
    document.getElementById('project-id').textContent = projectId;

    let currentFile = null;

    // Language detection based on file extension
    function detectLanguage(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      const langMap = {
        'js': 'javascript',
        'jsx': 'javascript',
        'ts': 'typescript',
        'tsx': 'typescript',
        'py': 'python',
        'java': 'java',
        'c': 'c',
        'cpp': 'cpp',
        'cc': 'cpp',
        'cxx': 'cpp',
        'cs': 'csharp',
        'php': 'php',
        'rb': 'ruby',
        'go': 'go',
        'rs': 'rust',
        'swift': 'swift',
        'kt': 'kotlin',
        'css': 'css',
        'scss': 'css',
        'sass': 'css',
        'html': 'markup',
        'xml': 'markup',
        'svg': 'markup',
        'json': 'json',
        'md': 'markdown',
        'sql': 'sql',
        'sh': 'bash',
        'bash': 'bash',
        'yml': 'yaml',
        'yaml': 'yaml',
        'txt': 'plaintext'
      };
      return langMap[ext] || 'plaintext';
    }

    // Syntax highlighting update function
    function updateSyntaxHighlight() {
      const textarea = document.getElementById('file-text');
      const highlightCode = document.getElementById('highlight-code');
      const text = textarea.value;
      
      if (!currentFile) return;
      
      const lang = detectLanguage(currentFile.original_name);
      highlightCode.className = `language-${lang}`;
      highlightCode.textContent = text;
      
      if (Prism && Prism.languages[lang]) {
        Prism.highlightElement(highlightCode);
      }
      
      // Sync scroll
      document.getElementById('syntax-highlight').scrollTop = textarea.scrollTop;
      document.getElementById('syntax-highlight').scrollLeft = textarea.scrollLeft;
    }

    // Sync scroll between textarea and highlight
    document.getElementById('file-text').addEventListener('scroll', function() {
      document.getElementById('syntax-highlight').scrollTop = this.scrollTop;
      document.getElementById('syntax-highlight').scrollLeft = this.scrollLeft;
    });

    // Update highlighting on input with debounce for performance
    let highlightTimeout;
    document.getElementById('file-text').addEventListener('input', function() {
      clearTimeout(highlightTimeout);
      highlightTimeout = setTimeout(updateSyntaxHighlight, 50);
    });

    // Handle tab key for proper indentation
    document.getElementById('file-text').addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = this.selectionStart;
        const end = this.selectionEnd;
        const value = this.value;
        this.value = value.substring(0, start) + '  ' + value.substring(end);
        this.selectionStart = this.selectionEnd = start + 2;
        updateSyntaxHighlight();
      }
    });

    async function loadInitial() {
      if (!projectId) {
        alert('Missing projectId in URL');
        return;
      }
      try {
        const proj = await apiFetch(`/api/projects/${encodeURIComponent(projectId)}`);
        document.getElementById('project-name').textContent = proj.project.name || 'Project';
        await loadQuota();
        await renderFiles(proj.files || []);
      } catch (err) {
        console.error(err);
        alert('Failed to load project: ' + (err.message || err));
      }
    }

    async function loadQuota() {
      try {
        const q = await apiFetch('/api/projects/quota');
        document.getElementById('quota-info').textContent = `${humanBytes(q.usedBytes)} / ${humanBytes(q.maxBytes||0)} used`;
      } catch (e) {
        document.getElementById('quota-info').textContent = 'Quota unavailable';
      }
    }

    function humanBytes(bytes) {
      if (!bytes && bytes !== 0) return '—';
      const units = ['B','KB','MB','GB','TB'];
      let i=0, n=Number(bytes);
      while(n>=1024 && i<units.length-1){ n/=1024; i++; }
      return `${n.toFixed(n<10 && i>0 ? 2 : 1)} ${units[i]}`;
    }

    async function renderFiles(files) {
      const container = document.getElementById('files');
      container.innerHTML = '';
      if (!files || files.length === 0) {
        container.innerHTML = '<div class="small">No files uploaded</div>';
        return;
      }
      files.forEach(f => {
        const card = document.createElement('div');
        card.className = 'file-card';

        const name = document.createElement('div');
        name.className = 'file-name';
        name.textContent = f.original_name;
        name.style = 'color: white;';
        card.appendChild(name);

        const meta = document.createElement('div');
        meta.className = 'file-meta';
        meta.textContent = `${f.mime || 'unknown'} · ${humanBytes(f.size)} · ${new Date(f.uploaded_at).toLocaleString()}`;
        card.appendChild(meta);

        const actions = document.createElement('div');
        actions.className = 'actions';

        const view = document.createElement('button');
        view.className = 'btn';
        view.textContent = 'View / Edit';
        view.onclick = () => openFile(f);
        actions.appendChild(view);

        const download = document.createElement('button');
        download.className = 'btn';
        download.textContent = 'Download';
        download.onclick = () => { window.open(`/api/projects/${encodeURIComponent(projectId)}/files/${encodeURIComponent(f.id)}`, '_blank'); };
        actions.appendChild(download);

        const copy = document.createElement('button');
        copy.className = 'btn';
        copy.textContent = 'Copy Link';
        copy.onclick = async () => {
          try {
            const data = await apiFetch(`/api/projects/${encodeURIComponent(projectId)}/files/${encodeURIComponent(f.id)}/public`);
            const url = data && data.url ? data.url : data;
            await navigator.clipboard.writeText(window.location.origin + url);
            copy.textContent = 'Copied!';
            setTimeout(()=> copy.textContent = 'Copy Link', 1400);
          } catch (err) {
            alert('Copy failed: ' + (err.message || err));
          }
        };
        actions.appendChild(copy);

        const replace = document.createElement('button');
        replace.className = 'btn';
        replace.textContent = 'Replace';
        replace.onclick = () => replaceFilePrompt(f);
        actions.appendChild(replace);

        const del = document.createElement('button');
        del.className = 'btn';
        del.textContent = 'Delete';
        del.onclick = async () => {
          if (!confirm(`Delete ${f.original_name}?`)) return;
          try {
            await apiFetch(`/api/projects/${encodeURIComponent(projectId)}/files/${encodeURIComponent(f.id)}`, { method: 'DELETE' });
            await loadQuota();
            await refreshFiles();
          } catch (err) {
            alert('Delete failed: ' + (err.message || err));
          }
        };
        actions.appendChild(del);

        card.appendChild(actions);
        container.appendChild(card);
      });
    }

    async function refreshFiles() {
      try {
        const p = await apiFetch(`/api/projects/${encodeURIComponent(projectId)}`);
        await renderFiles(p.files || []);
      } catch (err) {
        console.error('refresh', err);
      }
    }

    async function openFile(f) {
      currentFile = f;
      const lang = detectLanguage(f.original_name);
      const langBadge = `<span class="language-badge">${lang.toUpperCase()}</span>`;
      document.getElementById('file-info').innerHTML = `${f.original_name} — ${f.mime || 'unknown'} ${langBadge}`;
      document.getElementById('editor-msg').textContent = '';
      const ta = document.getElementById('file-text');
      const saveBtn = document.getElementById('save-btn');
      const downloadBtn = document.getElementById('download-btn');
      const closeBtn = document.getElementById('close-btn');
      const copyLinkBtn = document.getElementById('copy-link-btn');
      
      ta.value = '';
      ta.disabled = true;
      saveBtn.disabled = true;
      downloadBtn.disabled = false;
      copyLinkBtn.disabled = false;
      copyLinkBtn.onclick = async () => {
        try {
          const data = await apiFetch(`/api/projects/${encodeURIComponent(projectId)}/files/${encodeURIComponent(f.id)}/public`);
          const url = data && data.url ? data.url : data;
          await navigator.clipboard.writeText(window.location.origin + url);
          copyLinkBtn.textContent = 'Copied!';
          setTimeout(()=> copyLinkBtn.textContent = 'Copy Link', 1400);
        } catch (err) {
          alert('Copy failed: ' + (err.message || err));
        }
      };
      closeBtn.disabled = false;

      const textLike = (f.mime && (f.mime.startsWith('text/') || f.mime.includes('json') || f.mime.includes('javascript') || f.mime.includes('xml'))) || /\.txt|\.md|\.json|\.js|\.css|\.html|\.py|\.java|\.c|\.cpp|\.php|\.rb|\.go|\.rs$/i.test(f.original_name);
      if (!textLike) {
        document.getElementById('editor-msg').textContent = 'Binary or unsupported file for inline editing. You can download/replace/delete.';
        return;
      }

      try {
        const res = await apiFetch(`/api/projects/${encodeURIComponent(projectId)}/files/${encodeURIComponent(f.id)}`);
        const blob = await res.blob();
        const text = await blob.text();
        ta.value = text;
        ta.disabled = false;
        saveBtn.disabled = false;
        updateSyntaxHighlight();
      } catch (err) {
        console.error('open', err);
        document.getElementById('editor-msg').textContent = 'Failed to load file for editing';
      }
    }

    document.getElementById('save-btn').addEventListener('click', async () => {
      if (!currentFile) return;
      const ta = document.getElementById('file-text');
      const blob = new Blob([ta.value], { type: currentFile.mime || 'text/plain' });
      const form = new FormData();
      form.append('file', blob, currentFile.original_name);
      try {
        document.getElementById('editor-msg').textContent = 'Saving...';
        await fetch(`/api/projects/${encodeURIComponent(projectId)}/files/${encodeURIComponent(currentFile.id)}`, {
          method: 'PATCH',
          credentials: 'include',
          body: form
        }).then(r => { if (!r.ok) throw new Error(r.statusText || r.status); });
        document.getElementById('editor-msg').textContent = 'Saved successfully';
        await loadQuota();
        await refreshFiles();
      } catch (err) {
        console.error('save', err);
        document.getElementById('editor-msg').textContent = 'Save failed: ' + (err.message || err);
      }
    });

    document.getElementById('download-btn').addEventListener('click', () => {
      if (!currentFile) return;
      window.open(`/api/projects/${encodeURIComponent(projectId)}/files/${encodeURIComponent(currentFile.id)}`, '_blank');
    });

    document.getElementById('close-btn').addEventListener('click', () => {
      currentFile = null;
      document.getElementById('file-info').textContent = 'No file selected';
      document.getElementById('file-text').value = '';
      document.getElementById('file-text').disabled = true;
      document.getElementById('save-btn').disabled = true;
      document.getElementById('copy-link-btn').disabled = true;
      document.getElementById('download-btn').disabled = true;
      document.getElementById('close-btn').disabled = true;
      document.getElementById('editor-msg').textContent = '';
      document.getElementById('highlight-code').textContent = '';
    });

    document.getElementById('upload-btn').addEventListener('click', async () => {
      const input = document.getElementById('file-input');
      if (!input.files || input.files.length === 0) { alert('Select a file'); return; }
      const f = input.files[0];
      const form = new FormData();
      form.append('file', f);
      try {
        document.getElementById('upload-btn').textContent = 'Uploading...';
        await fetch(`/api/projects/${encodeURIComponent(projectId)}/files`, {
          method: 'POST',
          credentials: 'include',
          body: form
        }).then(r => { if (!r.ok) throw new Error(r.statusText || r.status); });
        input.value = '';
        await loadQuota();
        await refreshFiles();
        document.getElementById('upload-btn').textContent = 'Upload';
      } catch (err) {
        console.error('upload', err);
        alert('Upload failed: ' + (err.message || err));
        document.getElementById('upload-btn').textContent = 'Upload';
      }
    });

    document.getElementById('create-btn').addEventListener('click', async () => {
        const filename = document.getElementById('create-filename').value.trim();
        if (!filename) { alert('Enter a file name'); return; }
        const blob = new Blob([''], { type: 'text/plain' });
        const form = new FormData();
        form.append('file', blob, filename);
        try {
          document.getElementById('create-btn').textContent = 'Creating...';
          await fetch(`/api/projects/${encodeURIComponent(projectId)}/files`, {
            method: 'POST',
            credentials: 'include',
            body: form
          }).then(r => { if (!r.ok) throw new Error(r.statusText || r.status); });
          document.getElementById('create-filename').value = '';
          await loadQuota();
          await refreshFiles();
          document.getElementById('create-btn').textContent = 'Create New File';
        } catch (err) {
          console.error('create', err);
          alert('Create failed: ' + (err.message || err));
          document.getElementById('create-btn').textContent = 'Create New File';
        }
    });

    function replaceFilePrompt(fileMeta) {
      const el = document.createElement('input');
      el.type = 'file';
      el.accept = '*/*';
      el.onchange = async () => {
        if (!el.files || el.files.length === 0) return;
        const nf = el.files[0];
        const form = new FormData();
        form.append('file', nf);
        try {
          await fetch(`/api/projects/${encodeURIComponent(projectId)}/files/${encodeURIComponent(fileMeta.id)}`, {
            method: 'PATCH',
            credentials: 'include',
            body: form
          }).then(r => { if (!r.ok) throw new Error(r.statusText || r.status); });
          await loadQuota();
          await refreshFiles();
          if (currentFile && currentFile.id === fileMeta.id) openFile(fileMeta);
          alert('Replaced');
        } catch (err) {
          console.error('replace', err);
          alert('Replace failed: ' + (err.message || err));
        }
      };
      el.click();
    }

    loadInitial();
  </script>
  <script src="/js/cookies.js"></script>
  <script src="/js/genFP.js"></script>
</body>
</html>
