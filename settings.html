<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BakoSMP - Settings</title>
  <link rel="stylesheet" href="/main.css"/>
  <link rel="stylesheet" href="/cookie.css">
  <style>
    html {
      scroll-behavior: smooth;
    }
    
    .section {
      padding-top: 2em;
      margin-top: -2em; /* Offset for fixed header if needed */
    }
    
    .section:target {
      animation: highlight 2s ease-in-out;
    }
    
    @keyframes highlight {
      0% { background-color: rgba(255, 255, 255, 0.1); }
      50% { background-color: rgba(255, 255, 255, 0.2); }
      100% { background-color: transparent; }
    }

    .section-nav {
      margin: 20px 0;
      padding: 15px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }

    .section-nav a {
      display: inline-block;
      margin: 5px 10px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      text-decoration: none;
      border-radius: 4px;
      transition: background 0.3s;
    }

    .section-nav a:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
  <script src="/js/events.js" defer></script>
</head>
<body>
  <div class="particles" id="particles-js"></div>
  <div class="topbar">
    <img src="/main.png" alt="BakoSMP Logo" class="logo" />
    <span class="title">BakoSMP</span>
    <a class="title" href="/index" style="margin-left: 2em;">Home</a>
    <a class="title" href="/uploads" style="margin-left: 2em;">Uploads</a>
    <a class="title" href="/storage/" style="margin-left: 2em;">Data storage</a>
    <a class="title" href="/raindrippy/" style="margin-left: 2em;">RainDrippy</a>
  </div>
  <div id="cookie-banner">
    <p id="txt">This website uses cookies to ensure you get the best experience.</p>
    <a href="/raindrippy/privacy-policy" target="_blank">Learn more</a>
    <button id="cookie-ok">OK</button>
  </div>
  <script src="/js/cookies.js"></script>
  <div class="content">
    <section id="settings" class="section"></section>
    <script>
        fetch("https://bakosmp.go.ro/api/logged-in", {
            method: "GET",
            credentials: "include"
        }).then(async response => {
            const data = await response.json();
            if (data.loggedIn) {
                document.getElementById("settings").innerHTML = `
                    <h1>Settings</h1>
                    
                    <div class="section-nav">
                        <strong>Jump to:</strong>
                        <a href="#change-password">Change Password</a>
                        <a href="#delete-account">Delete Account</a>
                        <a href="#get-data">Get My Data</a>
                    </div>

                    <br><hr>
                    <section id="change-password" class="section">
                        <h3>Change Password</h3>
                        <form id="change-password-form">
                            <label for="current-password">Current Password:</label><br>
                            <input type="password" id="current-password" name="current-password" required><br><br>
                            <label for="new-password">New Password:</label><br>
                            <input type="password" id="new-password" name="new-password" required><br><br>
                            <button type="submit">Change Password</button>
                        </form>
                        <div id="change-password-message"></div>
                    </section>
                    <br><hr>
                    <section id="delete-account" class="section">
                        <h3>Delete Account</h3>
                        <form id="delete-account-form">
                            <button type="submit" style="background-color: red; color: white;">Delete Account</button>
                        </form>
                        <p><em>Warning: This action is irreversible and will delete all your data.</em></p>
                        <div id="delete-account-message"></div>
                    </section>
                    <br><hr>
                    <section id="get-data" class="section">
                        <h3>Get My Data</h3>
                        <p>You can request a copy of all your data stored on our servers.</p>
                        <button id="get-data-button">Request My Data</button>
                        <div><code id="get-data-message"></code></div>
                    </section>
                `;

                // Auto-scroll to hash on page load
                if (window.location.hash) {
                    setTimeout(() => {
                        const element = document.querySelector(window.location.hash);
                        if (element) {
                            element.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    }, 100);
                }
            } else {
                window.location.href = "/login";
            }
        });
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.body.style.display = "block";

            document.getElementById("change-password-form")?.addEventListener("submit", async (e) => {
                e.preventDefault();
                const currentPassword = document.getElementById("current-password").value;
                const newPassword = document.getElementById("new-password").value;

                const response = await fetch("https://bakosmp.go.ro/api/change-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({ currentPassword, newPassword })
                });
                const data = await response.json();
                document.getElementById("change-password-message").innerText = data.message;
            });

            document.getElementById("delete-account-form")?.addEventListener("submit", async (e) => {
                e.preventDefault();
                const password = document.getElementById("delete-password").value;

                const response = await fetch("https://bakosmp.go.ro/api/delete-account", {
                    method: "DELETE",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include"
                });
                const data = await response.json();
                if (response.status === 200) document.getElementById("delete-account-message").color = "green";
                else document.getElementById("delete-account-message").color = "red";
                document.getElementById("delete-account-message").innerText = data.message;
                if (data.success) {
                    setTimeout(() => { window.location.href = "/login"; }, 3000);
                }
            });

            document.getElementById("get-data-button")?.addEventListener("click", async () => {
                const response = await fetch("https://bakosmp.go.ro/api/account-data", {
                    method: "GET",
                    credentials: "include"
                });
                const data = await response.json();
                document.getElementById("get-data-message").innerText = JSON.stringify(data, null, 2);
            });

            // Handle hash changes for smooth scrolling
            window.addEventListener('hashchange', () => {
                const element = document.querySelector(window.location.hash);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    <script src="particles.js"></script>
    <script src="/js/genFP.js"></script>
  </div>
</body>
</html>
